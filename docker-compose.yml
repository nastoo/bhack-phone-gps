services:
  gps-stream:
    build: .
    ports:
      - "${GPS_PORT:-8080}:8080"
    environment:
      GPS_TOKEN: ${GPS_TOKEN:-}
      GPS_HISTORY_SIZE: ${GPS_HISTORY_SIZE:-120}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
