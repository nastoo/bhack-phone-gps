services:
  gps-stream:
    build: .
    container_name: phone-gps
    restart: unless-stopped
    env_file: .env
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      # Host must match exactly what you open in the browser (see TRAEFIK_HOST in .env)
      - "traefik.http.routers.phone-gps.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.phone-gps.entrypoints=websecure"
      - "traefik.http.routers.phone-gps.tls=true"
      - "traefik.http.routers.phone-gps.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.phone-gps.tls.domains[0].main=${TRAEFIK_HOST}"
      - "traefik.http.services.phone-gps.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  traefik_proxy:
    external: true
