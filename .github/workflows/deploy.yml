name: Deploy to server

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: /home/nathan/phone_gps

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}

      - name: Copy project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml,Dockerfile,requirements.txt,.dockerignore,app,static"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          TRAEFIK_HOST: ${{ vars.TRAEFIK_HOST }}
          CERT_RESOLVER: ${{ vars.CERT_RESOLVER }}
          GPS_TOKEN: ${{ secrets.GPS_TOKEN }}
          GPS_HISTORY_SIZE: ${{ vars.GPS_HISTORY_SIZE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: TRAEFIK_HOST,CERT_RESOLVER,GPS_TOKEN,GPS_HISTORY_SIZE
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            printf 'TRAEFIK_HOST=%s\nCERT_RESOLVER=%s\nGPS_TOKEN=%s\nGPS_HISTORY_SIZE=%s\n' \
              "${TRAEFIK_HOST:?TRAEFIK_HOST is required}" \
              "${CERT_RESOLVER:-letsencrypt}" \
              "${GPS_TOKEN:-}" \
              "${GPS_HISTORY_SIZE:-120}" > .env

            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "Deployment complete:"
            docker compose ps
